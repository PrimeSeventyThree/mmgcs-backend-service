<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/styles/style.css" />
        <script src="/scripts/script.js" defer></script>
        <title>Login</title>
        <style></style>
    </head>
    <body>
        <h1>Login</h1>
        <div class="form" id="form-container">
            <form id="login-form">
                <div>Username</div>
                <div><input id="username" name="username" type="text" autocomplete="username" required /></div>

                <div>Password</div>
                <div><input id="password" name="password" type="password" autocomplete="current-password" required /></div>

                <button type="submit">Log in</button>
            </form>
        </div>
        <div id="message" class="message" hidden></div>
    </body>
</html>
