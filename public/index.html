<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/styles/style.css" />
        <script src="/scripts/script.js" defer></script>
        <title>Login</title>
        <style></style>
    </head>
    <body>
        <h1 id="header-message" class="header">Login</h1>
        <div class="form">
            <form id="login-form">
                <div class="label">Username</div>
                <div><input id="username" name="username" type="text" autocomplete="username" required /></div>

                <div class="label">Password</div>
                <div><input id="password" name="password" type="password" autocomplete="current-password" required /></div>

                <button type="submit" class="label">Log in</button>
            </form>
            <div id="message" class="message" hidden></div>
            <button id="profile-button" hidden class="label">Show Profile</button>
            <button id="logout-button" hidden class="logout">Logout</button>
        </div>
    </body>
</html>
